<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasun & Tharushi - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video class="hero-video" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-bride-and-groom-walking-in-the-park-4113-large.mp4" type="video/mp4">
    </video>
    <div class="light-flare"></div>

    <div class="main-content">
        <!-- Hero Section -->
        <section class="hero-section" id="hero">
            <div class="hero-content">
                <div class="names-wrapper">
                    <h1 class="sinhala-names">කසුන් සහ තරුෂි</h1>
                    <p class="english-names">Kasun & Tharushi</p>
                </div>
                <div class="scroll-indicator">
                    <span>ආරාධනය</span>
                    <div class="arrow-down"></div>
                </div>
            </div>
        </section>

        <!-- Details Section -->
        <section class="details-section">
            <div class="invitation-text">
                <h2 class="sinhala-text">අපගේ විවාහ මංගල්‍යයට ඔබට ආදරයෙන් ආරාධනා කරමු</h2>
                <div class="divider"></div>
            </div>

            <div class="event-details">
                <div class="event-card">
                    <h3 class="sinhala-title">දිනය</h3>
                    <p class="date sinhala-text">2026 දෙසැම්බර් 25</p>
                    <p class="time sinhala-text">පෙ.ව. 10:00 සිට</p>
                </div>
                
                <div class="event-card">
                    <h3 class="sinhala-title">ස්ථානය</h3>
                    <p class="venue-name sinhala-text">ද ගෝල්ඩන් ෆොරස්ට් එස්ටේට්</p>
                    <p class="venue-address sinhala-text">මහනුවර, ශ්‍රී ලංකාව</p>
                </div>
            </div>

            <div class="rsvp-section">
                <h3 class="sinhala-title">පැමිණීම තහවුරු කිරීම</h3>
                <p class="sinhala-text">කරුණාකර නොවැම්බර් 20 දිනට පෙර ඔබගේ පැමිණීම තහවුරු කරන්න</p>
                <button class="rsvp-button sinhala-text">පැමිණීම තහවුරු කරන්න</button>
            </div>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
